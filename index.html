<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站正在建设中</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --text: #e0e0e0;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.4);
            --subtext: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --footer-text: #6b6b80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* 动态背景粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.7;
            }
            30% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1.8);
            }
        }

        /* 网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 50% 40%, rgba(108, 99, 255, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 20% 70%, rgba(108, 99, 255, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 30%, rgba(108, 99, 255, 0.05) 0%, transparent 50%);
        }
        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* 主卡片 */
        .main-card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 40px 40px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 80px -20px var(--accent-glow);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: cardEntry 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes cardEntry {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 头像 */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }
        .avatar-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            padding: 3px;
            background: conic-gradient(from 0deg,
                    var(--accent),
                    rgba(108, 99, 255, 0.3),
                    var(--accent),
                    transparent,
                    var(--accent));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
            animation: ringRotate 6s linear infinite;
        }
        @keyframes ringRotate {
            to {
                transform: rotate(360deg);
            }
        }
        .avatar-pulse {
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            border: 2px solid rgba(108, 99, 255, 0.25);
            animation: pulseRing 2.5s ease-out infinite;
        }
        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.35);
                opacity: 0;
            }
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2;
            border: 4px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: #2a2a3d;
        }
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 16px 40px rgba(108, 99, 255, 0.35);
        }

        /* 图片加载失败时显示的占位容器（样式保持一致） */
        .avatar-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            border: 4px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #3b3b55 0%, #2a2a3d 100%);
        }
        .avatar-placeholder svg {
            width: 50px;
            height: 50px;
            opacity: 0.7;
        }

        /* 名字 */
        .name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.03em;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff 0%, #c8c8e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 状态标签 */
        .badge {
            display: inline-block;
            background: rgba(108, 99, 255, 0.15);
            color: #b5aeff;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 20px;
            letter-spacing: 0.04em;
            margin-bottom: 20px;
            border: 1px solid rgba(108, 99, 255, 0.25);
        }
        .badge-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ffb74d;
            margin-right: 6px;
            animation: dotBlink 1.6s ease-in-out infinite;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        @keyframes dotBlink {
            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 6px #ffb74d;
            }
            50% {
                opacity: 0.35;
                box-shadow: 0 0 2px #ffb74d;
            }
        }

        /* 标题 */
        .title {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        .title .icon-hammer {
            display: inline-block;
            animation: swing 2s ease-in-out infinite;
            transform-origin: 70% 100%;
        }
        @keyframes swing {
            0%,
            100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-15deg);
            }
            50% {
                transform: rotate(10deg);
            }
            75% {
                transform: rotate(-5deg);
            }
        }
        .subtitle {
            font-size: 1rem;
            color: var(--subtext);
            line-height: 1.7;
            margin-bottom: 10px;
        }

        /* 进度条 */
        .progress-wrap {
            margin-top: 24px;
            margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a78bfa, #c4b5fd);
            border-radius: 10px;
            width: 65%;
            animation: progressShimmer 3s ease-in-out infinite;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.35) 40%,
                    rgba(255, 255, 255, 0.35) 60%,
                    transparent 100%);
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes progressShimmer {
            0%,
            100% {
                width: 65%;
            }
            50% {
                width: 78%;
            }
        }
        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        .progress-label {
            font-size: 0.78rem;
            color: var(--subtext);
            margin-top: 8px;
            letter-spacing: 0.03em;
        }

        /* 联系方式占位 */
        .contact-hint {
            margin-top: 18px;
            font-size: 0.85rem;
            color: #7777a0;
            letter-spacing: 0.02em;
        }
        .contact-hint span {
            color: #b5aeff;
        }

        /* 底部版权 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            text-align: center;
            padding: 18px 20px;
            background: linear-gradient(to top, rgba(15, 15, 26, 0.95) 0%, rgba(15, 15, 26, 0) 100%);
        }
        .footer-inner {
            font-size: 0.82rem;
            color: var(--footer-text);
            letter-spacing: 0.03em;
        }
        .footer-inner .copy-symbol {
            font-size: 0.9rem;
        }
        .footer-inner .year {
            color: #8b8ba8;
        }
        .footer-inner .brand {
            color: #9d96e8;
            font-weight: 600;
        }

        /* 响应式 */
        @media (max-width: 520px) {
            .main-card {
                padding: 36px 22px 30px;
                border-radius: 18px;
            }
            .avatar,
            .avatar-placeholder {
                width: 88px;
                height: 88px;
            }
            .avatar-placeholder svg {
                width: 38px;
                height: 38px;
            }
            .avatar-ring {
                inset: -6px;
            }
            .avatar-pulse {
                inset: -13px;
            }
            .title {
                font-size: 1.55rem;
            }
            .name {
                font-size: 1.35rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- 网格背景 -->
    <div class="grid-bg"></div>

    <!-- 动态粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 主卡片 -->
    <div class="main-card">
        <!-- 头像区域 -->
        <div class="avatar-wrapper">
            <div class="avatar-ring"></div>
            <div class="avatar-pulse"></div>
            <!-- 👇 本地图片引用：请将头像图片命名为 avatar.jpg 放在本文件同目录下，支持 png 等格式，修改 src 即可 -->
            <!-- 若图片加载失败会自动显示默认用户图标，无需担心空白 -->
            <img 
                class="avatar" 
                src="avatar.jpg" 
                alt="头像"
                onerror="this.onerror=null; this.outerHTML='<div class=&#39;avatar-placeholder&#39;><svg viewBox=&#39;0 0 24 24&#39; fill=&#39;none&#39; stroke=&#39;rgba(255,255,255,0.55)&#39; stroke-width=&#39;1.2&#39; stroke-linecap=&#39;round&#39; stroke-linejoin=&#39;round&#39;><circle cx=&#39;12&#39; cy=&#39;8&#39; r=&#39;4&#39;/><path d=&#39;M4 20c0-4 3.6-7 8-7s8 3 8 7&#39;/></svg></div>';"
            >
        </div>

        <!-- 名字 -->
        <div class="name">孤 舟</div>

        <!-- 状态标签 -->
        <div class="badge">
            <span class="badge-dot"></span>施工中
        </div>

        <!-- 标题 -->
        <div class="title">
            网站正在建设
            <span class="icon-hammer">🔨</span>
        </div>
        <p class="subtitle">
            我们正在精心打磨每一个细节，<br>力求为您呈现最好的体验。
        </p>

        <!-- 进度条 -->
        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-label">整体进度 ≈ 65% · 敬请期待</div>
        </div>

        <!-- 联系提示 -->
        <div class="contact-hint">
            如有急事请联系：<span>guzhou404@mirrorx.ltd</span>
        </div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        <div class="footer-inner">
            <span class="copy-symbol">©</span>
            <span class="year" id="currentYear">2026</span>
            <span> 孤舟的网站 · </span>
            <span class="brand">All Rights Reserved</span>
        </div>
    </div>

    <script>
        // 动态年份
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        const particleCount = 35;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 5 + 2;
            const left = Math.random() * 100;
            const duration = Math.random() * 10 + 8;
            const delay = Math.random() * 12;
            const hueShift = Math.random() * 40 - 20;

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = left + '%';
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = delay + 's';
            particle.style.background = `hsla(${250 + hueShift}, 80%, 68%, 0.7)`;
            particle.style.boxShadow = `0 0 ${size * 2}px rgba(108,99,255,0.5)`;

            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
